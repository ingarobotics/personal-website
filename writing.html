<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — Inga Zhuravleva</title>
  <link rel="stylesheet" href="style.css">
  <script src="colors.js"></script>
</head>
<body>
  <div class="hamburger" id="hamburger-menu">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <div class="main-content">
    <div class="content-block">
      <h2>Writing</h2>
      <ul class="post-list" id="post-list"></ul>
    </div>
  </div>

  <nav id="sidebar">
    <a href="index.html">home</a>
    <a class="disabled">bookshelf</a>
    <a href="writing.html" class="active">writing</a>
  </nav>

  <script src="posts-data.js"></script>
  <script>
    document.getElementById('post-list').innerHTML = (window.POSTS || []).map(p => `
      <li class="post-item">
        <span class="post-date">${p.date}</span>
        <a href="post.html?slug=${p.slug}">${p.title}</a>
      </li>
    `).join('');

    document.getElementById('hamburger-menu').addEventListener('click', function () {
      document.getElementById('sidebar').classList.toggle('active');
    });
  </script>
  <script src="content.js"></script>
  <script src="editor.js"></script>
</body>
</html>
